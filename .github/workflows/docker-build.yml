name: Build and Deploy Containers

on:
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image_suffix: backend
            context: .
            dockerfile: ./Dockerfile
          - service: frontend
            image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image coordinates
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> "$GITHUB_ENV"
          echo "REPO=$REPO" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare frontend build env
        if: ${{ matrix.service == 'frontend' }}
        env:
          FRONTEND_ENV_FILE_CONTENTS: ${{ secrets.FRONTEND_ENV_FILE_CONTENTS }}
        run: |
          rm -f frontend/.env.production
          if [ -n "${FRONTEND_ENV_FILE_CONTENTS}" ]; then
            printf '%s\n' "${FRONTEND_ENV_FILE_CONTENTS}" | grep -E '^[[:space:]]*NEXT_PUBLIC_[A-Z0-9_]+=' > frontend/.env.production || true
          fi
          if [ ! -s frontend/.env.production ]; then
            echo "No NEXT_PUBLIC_* vars provided for frontend build."
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Self-Hosted Runner
    runs-on: self-hosted
    environment: Production
    needs: build-and-push
    env:
      ENV_FILE_CONTENTS: ${{ secrets.ENV_FILE_CONTENTS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="latest"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull ghcr.io/${OWNER}/${REPO}-backend:${TAG}
          docker pull ghcr.io/${OWNER}/${REPO}-frontend:${TAG}

      - name: Write runtime env files
        run: |
          : > .env
          if [ -n "$ENV_FILE_CONTENTS" ]; then
            printf '%s' "$ENV_FILE_CONTENTS" > .env
          fi

      - name: Start/Update services via compose (prod)
        run: |
          DB_HOST="$(grep -E '^MYSQL_HOST=' .env | tail -n 1 | cut -d '=' -f 2- | tr -d '\r' | xargs || true)"
          if [ -z "$DB_HOST" ] || [ "$DB_HOST" = "mysql" ]; then
            docker compose -f docker-compose.prod.yml up -d --pull always --remove-orphans --force-recreate mysql chrisbot chrisbot-fe
          else
            docker compose -f docker-compose.prod.yml stop mysql || true
            docker compose -f docker-compose.prod.yml rm -f mysql || true
            docker compose -f docker-compose.prod.yml up -d --pull always --remove-orphans --force-recreate chrisbot chrisbot-fe
          fi
