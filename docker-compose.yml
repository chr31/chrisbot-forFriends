services:
  mysql:
    image: mysql:8.4
    container_name: chrisbot-mysql
    profiles:
      - local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - chrisbot-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5-community
    container_name: chrisbot-neo4j
    profiles:
      - local-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me-neo4j}"
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - chrisbot-neo4j-data:/data
      - chrisbot-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  chrisbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: chrisbot:latest
    container_name: chrisbot
    dns:
      - ${CHRISBOT_DNS_1:-8.8.8.8}
      - ${CHRISBOT_DNS_2:-8.8.4.4}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      ROUTINES_BASE_DIR: ${ROUTINES_BASE_DIR:-/app/runtime/routines}
    volumes:
      - chrisbot-routines-data:${ROUTINES_BASE_DIR:-/app/runtime/routines}
    restart: unless-stopped

  chrisbot-fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LOCAL_LOGIN_ENABLED: ${NEXT_PUBLIC_LOCAL_LOGIN_ENABLED:-false}
    image: chrisbot-fe:latest
    container_name: chrisbot-fe
    dns:
      - ${CHRISBOT_DNS_1:-8.8.8.8}
      - ${CHRISBOT_DNS_2:-8.8.4.4}
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
      BACKEND_URL: http://chrisbot:3000
      NEXT_PUBLIC_LOCAL_LOGIN_ENABLED: ${NEXT_PUBLIC_LOCAL_LOGIN_ENABLED:-false}
    depends_on:
      - chrisbot
    restart: unless-stopped

    # Uncomment to add a simple healthcheck if you add a /health route
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3

volumes:
  chrisbot-mysql-data:
  chrisbot-neo4j-data:
  chrisbot-neo4j-logs:
  chrisbot-routines-data:
