services:
  mysql:
    image: mysql:8.4
    container_name: chrisbot-mysql
    profiles:
      - local-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chrisbot-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: chrisbot-neo4j
    profiles:
      - local-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me-neo4j}"
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - chrisbot-neo4j-data:/data
      - chrisbot-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  chrisbot:
    image: ghcr.io/${OWNER:-owner}/${REPO:-chrisbot}-backend:${TAG:-latest}
    container_name: chrisbot
    dns:
      - ${CHRISBOT_DNS_1:-8.8.8.8}
      - ${CHRISBOT_DNS_2:-8.8.4.4}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      ROUTINES_BASE_DIR: ${ROUTINES_BASE_DIR:-/app/runtime/routines}
    volumes:
      - chrisbot-routines-data:${ROUTINES_BASE_DIR:-/app/runtime/routines}
    restart: unless-stopped

  chrisbot-fe:
    image: ghcr.io/${OWNER:-owner}/${REPO:-chrisbot}-frontend:${TAG:-latest}
    container_name: chrisbot-fe
    dns:
      - ${CHRISBOT_DNS_1:-8.8.8.8}
      - ${CHRISBOT_DNS_2:-8.8.4.4}
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
      BACKEND_URL: http://chrisbot:3000
    depends_on:
      - chrisbot
    restart: unless-stopped

volumes:
  chrisbot-mysql-data:
  chrisbot-neo4j-data:
  chrisbot-neo4j-logs:
  chrisbot-routines-data:
